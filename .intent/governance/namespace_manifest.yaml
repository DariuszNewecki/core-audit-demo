# .intent/governance/namespace_manifest.yaml
#
# Authority: policy
# Status:    active
# Governs:   ADR-075 D4, D5, D6, D8
# Vocabulary: .intent/taxonomies/governance_namespaces.yaml
# Completeness rule: governance.namespace.classification_complete (D7)
#
# Classifies every file under .intent/ and .specs/ into the
# `governance_namespace` vocabulary declared by the taxonomy register.
# Per ADR-075 D5, the governor is the classification authority. Type
# and directory seed defaults; the governor MAY override per file.
#
# Per D6 the manifest is per-layer in shape — CORE's deployment manifest
# is the union of framework entries and project::core entries. This file
# carries both layers as a single classified surface today. When the
# governance application separates layers into per-layer storage
# (follow-on issue), this file is the source the per-layer split reads
# from. A BYOR deployment authors its own `project::<external>` entries
# in its own repo's layer; this file is the framework + project::core
# layer of the CORE deployment.
#
# Per D8, this initial population is a one-shot full pass. Going forward,
# governance.namespace.classification_complete (D7, reporting) detects
# any file added to .intent/ or .specs/ without an entry here and posts
# a finding for governor classification — the §11 backfill-on-touch
# posture applied to the manifest itself.
#
# Entry shape:
#   - path: <relative path from repo root>
#     governance_namespace: framework | project::core
#     # notes:  (optional) governor-facing rationale on gray-zone entries.
#                Used by the initial draft to flag entries where the
#                heuristic could plausibly resolve either way and the
#                governor should review the decision.
#
# Sections are organized framework first, then project::core. Within
# each section, entries are grouped by subtree to support quick review.

