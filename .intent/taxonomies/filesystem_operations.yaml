# .intent/taxonomies/filesystem_operations.yaml
version: "1.0.0"
status: active
authority: constitutional
title: CORE Filesystem-Operation Taxonomy
python_version: "3.12"
description: >
  Canonical call-name → op-class taxonomy for filesystem-touching operations
  in the standard library. The audit-side taxonomy declared by ADR-077 §2
  and consumed by the protected-namespace access check; vocabulary contract
  is `fs_audit_op_class` in .intent/META/enums.json (ADR-080 D3).

  Two blocks. ``pathlib_path:`` enumerates every public method on
  pathlib.Path — auto-discovery target for the introspective completeness
  check declared by ADR-077 §3; absence of a discovered Path method from
  this block is a finding. ``watched:`` is the curated set of qualified
  call names outside pathlib.Path that governance has chosen to classify;
  the completeness check verifies each watched name still resolves to a
  callable in its module (catches stdlib rename/removal) and is classified,
  but does not auto-discover new members in those mixed namespaces.

  Per-entry fields:
  - op_class: one of fs_audit_op_class.enum (read/traverse/parse/write/neutral)
  - match: leaf (matches n.func.attr; catches Path("x").m() AND p.m() forms)
           or qualified (matches the dotted form via ASTHelpers.full_attr_name
           / resolve_qualified_name; required for module-rooted families
           whose leaves collide with non-FS methods, e.g. os.replace vs
           str.replace)
  - predicate (optional): named mode-gate function applied at audit time;
           the only predicate declared today is `write_mode`, which filters
           open() calls to write/append modes per the existing _is_write_mode
           helper.

  Seeding rationale (ADR-077 §4): the watched block seeds the existing
  no_direct_writes coverage plus the six previously-silent write calls
  ADR-077 §4 calls out (mkdir/makedirs/touch/symlink/link/chmod). Read-side
  curation for os/shutil/tempfile is deferred — the policy shape that ships
  with §6 step 3 is `forbidden_classes: [write]`, which has no use for
  read-class watched names. Tempfile is not seeded for the same reason.
  Pathlib.Path's read-side methods ARE classified here because §3 mandates
  every public Path method be present; classification cost is bounded
  (~52 entries) and unblocks the completeness check.

  Authority: ADR-077 §2 (taxonomy declaration); ADR-080 D4 (enum binding);
  ADR-068 (.intent/taxonomies/ pattern). Sole loader:
  src/shared/infrastructure/intent/filesystem_operations.py.

operations:

  # ---------------------------------------------------------------------------
  # pathlib.Path — every public method classified.
  # ADR-077 §3: "every public method must be classified. A method present in
  # the runtime but absent from the taxonomy is a finding." The completeness
  # check enumerates pathlib.Path public callables via inspect.getmembers and
  # set-differences against this block; any gap fires manual_review.
  #
  # Per-entry match: leaf by convention. Three exceptions — `replace`,
  # `rename`, and `open` — are declared qualified to avoid colliding with
  # high-volume non-FS attribute names. Leaf-matching `replace` would fire
  # on every `str.replace(...)` (~140 src/ sites); leaf-matching `open`
  # would fire on `tarfile.open(mode="w:gz")`, `gzip.open(...)`, and any
  # other module's `.open()` method. Detection of the write semantics on
  # these names runs through the watched-block entries (`os.replace`,
  # `os.rename`, builtin `open`); the pathlib qualified entries below
  # exist for §3 completeness compliance but never resolve at detection
  # time (`Path("x").replace(...)` and `Path("x").open("w")` have Call
  # receivers, unresolvable through `resolve_qualified_name` — the
  # detection routes through the watched-block bare `open` and `os.*`
  # entries instead). The variable-receiver bypass (`p.replace(...)`,
  # `p.open("w")`) is a pre-existing, accepted gap — see #506 follow-up.
  # ---------------------------------------------------------------------------
  pathlib_path:
    absolute:          { op_class: neutral,  match: leaf }
    as_posix:          { op_class: neutral,  match: leaf }
    as_uri:            { op_class: neutral,  match: leaf }
    chmod:             { op_class: write,    match: leaf }
    cwd:               { op_class: read,     match: leaf }
    exists:            { op_class: read,     match: leaf }
    expanduser:        { op_class: neutral,  match: leaf }
    glob:              { op_class: traverse, match: leaf }
    group:             { op_class: read,     match: leaf }
    hardlink_to:       { op_class: write,    match: leaf }
    home:              { op_class: read,     match: leaf }
    is_absolute:       { op_class: neutral,  match: leaf }
    is_block_device:   { op_class: read,     match: leaf }
    is_char_device:    { op_class: read,     match: leaf }
    is_dir:            { op_class: read,     match: leaf }
    is_fifo:           { op_class: read,     match: leaf }
    is_file:           { op_class: read,     match: leaf }
    is_junction:       { op_class: read,     match: leaf }
    is_mount:          { op_class: read,     match: leaf }
    is_relative_to:    { op_class: neutral,  match: leaf }
    is_reserved:       { op_class: neutral,  match: leaf }
    is_socket:         { op_class: read,     match: leaf }
    is_symlink:        { op_class: read,     match: leaf }
    iterdir:           { op_class: traverse, match: leaf }
    joinpath:          { op_class: neutral,  match: leaf }
    lchmod:            { op_class: write,    match: leaf }
    lstat:             { op_class: read,     match: leaf }
    match:             { op_class: neutral,  match: leaf }
    mkdir:             { op_class: write,    match: leaf }
    open:              { op_class: write,    match: qualified, predicate: write_mode }
    owner:             { op_class: read,     match: leaf }
    read_bytes:        { op_class: read,     match: leaf }
    read_text:         { op_class: read,     match: leaf }
    readlink:          { op_class: read,     match: leaf }
    relative_to:       { op_class: neutral,  match: leaf }
    rename:            { op_class: write,    match: qualified }
    replace:           { op_class: write,    match: qualified }
    resolve:           { op_class: read,     match: leaf }
    rglob:             { op_class: traverse, match: leaf }
    rmdir:             { op_class: write,    match: leaf }
    samefile:          { op_class: read,     match: leaf }
    stat:              { op_class: read,     match: leaf }
    symlink_to:        { op_class: write,    match: leaf }
    touch:             { op_class: write,    match: leaf }
    unlink:            { op_class: write,    match: leaf }
    walk:              { op_class: traverse, match: leaf }
    with_name:         { op_class: neutral,  match: leaf }
    with_segments:     { op_class: neutral,  match: leaf }
    with_stem:         { op_class: neutral,  match: leaf }
    with_suffix:       { op_class: neutral,  match: leaf }
    write_bytes:       { op_class: write,    match: leaf }
    write_text:        { op_class: write,    match: leaf }

  # ---------------------------------------------------------------------------
  # Curated watched set — qualified match.
  # ADR-077 §3: "os, shutil, tempfile, builtin open: a curated watched set
  # in the taxonomy. The check verifies each watched name still resolves to a
  # callable in its module and is classified. It does not auto-discover new
  # FS members here — introspection cannot separate FS from non-FS in these
  # mixed namespaces."
  #
  # Seeded for §6 step 1: existing no_direct_writes coverage from
  # .intent/enforcement/mappings/architecture/governance_basics.yaml's
  # forbidden_additional list (os/shutil writes + builtin open), plus the
  # six §4-named gaps (mkdir/makedirs/touch/symlink/link/chmod) in their
  # os-module form. Read-side curation deferred.
  #
  # aiofiles.open is NOT seeded despite appearing in the legacy
  # forbidden_additional list: the library is not a runtime dependency and
  # does not resolve in this venv. The completeness check (§3) requires
  # each watched name to resolve, and the taxonomy's contract is
  # "classified surfaces actually present in this runtime," not
  # "speculative defensive coverage." This is precisely the kind of silent
  # drift §3 was designed to catch — flagged by the completeness check on
  # first run and removed here. If aiofiles is added as a dependency, the
  # taxonomy and the audit policy's forbidden surface are updated together.
  # ---------------------------------------------------------------------------
  watched:
    # builtin open — module-qualified is the bare name. Mode predicate filters
    # to write/append per existing _is_write_mode in purity_checks.
    open:              { op_class: write, match: qualified, predicate: write_mode }

    # os filesystem-mutation family (existing no_direct_writes set)
    "os.replace":      { op_class: write, match: qualified }
    "os.rename":       { op_class: write, match: qualified }
    "os.remove":       { op_class: write, match: qualified }
    "os.unlink":       { op_class: write, match: qualified }
    "os.rmdir":        { op_class: write, match: qualified }

    # os filesystem-mutation family (ADR-077 §4 gaps)
    "os.mkdir":        { op_class: write, match: qualified }
    "os.makedirs":     { op_class: write, match: qualified }
    "os.symlink":      { op_class: write, match: qualified }
    "os.link":         { op_class: write, match: qualified }
    "os.chmod":        { op_class: write, match: qualified }

    # shutil filesystem-mutation family (existing no_direct_writes set)
    "shutil.copyfile": { op_class: write, match: qualified }
    "shutil.copy":     { op_class: write, match: qualified }
    "shutil.copy2":    { op_class: write, match: qualified }
    "shutil.move":     { op_class: write, match: qualified }
    "shutil.rmtree":   { op_class: write, match: qualified }
