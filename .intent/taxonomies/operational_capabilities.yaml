version: "1.0.0"
status: active
authority: constitutional
title: CORE Operational Capability Taxonomy
description: >
  Canonical declaration of operational capabilities in CORE. An operational
  capability is a named unit of what CORE-as-a-system does — distinct from a
  cognitive capability per CORE-Capability-Taxonomy.md, which describes what an
  LLM model can do. This file is the authoritative source of the operational-
  capability name set and the filesystem profile per capability used by the
  runtime chokepoint to authorize writes. Framework authority:
  .specs/papers/CORE-Capability-Scoped-Filesystem-Authority.md. Schema declared
  by ADR-078.

  This file is the LIVE-AUTHORIZATION SURFACE — it enumerates capabilities the
  chokepoint will authorize, not the complete @atomic_action / @register_action
  registry. The two surfaces diverge by exactly the dormant set (see ADR-078
  D9): a capability that is structurally non-functional today is absent from
  this file but may still appear in .intent/enforcement/config/action_risk.yaml
  and in src/ as a decorator. (The prior example — fix.policy_ids — was
  retired entirely in #493 on identity-shape grounds: policies have
  human-readable id as TRUE identity; opaque UUIDs were the wrong shape
  for a human-readable artefact.)

  Chokepoint primitives (file.create, file.edit, file.read, file.tag_metadata)
  are NOT capabilities and do not appear here per ADR-078 D8. They are the
  chokepoint itself; the chokepoint authorizes their invocation based on the
  calling capability's fs_profile.

  Loader: src/shared/infrastructure/intent/operational_capabilities.py.
  Validation is fail-closed per ADR-068 pattern; no META JSON schema. The
  loader derives fs_profile key names from .intent/META/enums.json
  fs_operation_class enum and validates modes against operational_mode enum.

capabilities:

  action.execute:
    description: Meta-dispatcher — invokes other atomic actions; FS authorization resolves at runtime against the dispatched capability per paper §7.
    risk: moderate
    fs_profile:
      read: []
      create: []
      modify: []
      delete: []

  admin.meta:
    description: Constitutional file index — lists indexed .intent/ files for operator inspection. Read-only.
    risk: safe
    fs_profile:
      read:
        - {path_pattern: ".intent/**", modes: [dev, live]}
      create: []
      modify: []
      delete: []

  build.tests:
    description: Generates a pytest test file for a source file via CoderAgent; path mapping governed by .intent/enforcement/config/test_coverage.yaml.
    risk: safe
    fs_profile:
      read:
        - {path_pattern: ".intent/rules/**", modes: [dev, live]}
        - {path_pattern: ".intent/enforcement/config/test_coverage.yaml", modes: [dev, live]}
      create:
        - {path_pattern: "tests/**/test_*.py", modes: [dev, live]}
      modify: []
      delete: []

