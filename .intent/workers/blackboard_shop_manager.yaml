$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.blackboard_shop_manager
  title: Blackboard ShopManager
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "d4e5f6a7-c8d9-4e0f-1a2b-3c4d5e6f7a8b"
  class: supervision

mandate:
  responsibility: >
    Detect Blackboard entries that have exceeded their constitutional SLA
    and post a finding for each stale unclaimed or unresolved entry. Per
    ADR-082, also runs writer-as-sensor retention sweeps each cycle:
    Mechanism 1 (hard-DELETE terminal telemetry past TTL) and Mechanism 2
    (status transition open → resolved for stale DELEGATE-class OPEN
    findings). Both sweeps are bounded by blackboard.sweep_batch_max and
    operate on operator-curated subject allowlists in
    .intent/enforcement/config/operational_config.yaml.
  phase: audit
  approval_required: false
  scope:
    domains:
      - governance
      - compliance
  schedule:
    max_interval: 600

implementation:
  module: will.workers.blackboard_shop_manager
  class: BlackboardShopManager
  requires_core_context: false
