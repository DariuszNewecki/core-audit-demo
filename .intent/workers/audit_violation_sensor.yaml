$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_violation_sensor
  title: Audit Violation Sensor (base — no namespace)
  version: "1.1.0"
  authority: policy
  status: paused
  rationale: >
    This is the base declaration with no rule_namespace. It is kept as a
    reference and for explicit call-site instantiation (e.g. core-admin workers
    remediate). The daemon does not start this directly — it starts the
    per-namespace declarations instead (audit_sensor_purity.yaml,
    audit_sensor_architecture.yaml, audit_sensor_logic.yaml,
    audit_sensor_modularity.yaml). Those are the active entries that back
    the autonomous sensing loop.

identity:
  uuid: "7199fd0e-a8ed-40e6-b7f1-5718d6b79ae4"
  class: sensing

mandate:
  responsibility: >
    Run the constitutional auditor scoped to a configured rule namespace and
    post each unprocessed violation as a blackboard finding for downstream
    processing by ViolationRemediatorWorker. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  scope:
    paths: []
    domains:
      - audit
      - compliance
  approval_required: false

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
