$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.test_remediator
  title: Test Remediator
  version: "0.1.0"
  authority: policy
  status: active

identity:
  uuid: "23cd81f7-6387-461c-a716-87ad95c3f870"
  class: acting

mandate:
  responsibility: >
    Claims test.missing and test.failure findings and creates build.tests
    proposals for autonomous test generation.
  phase: execution
  permitted_tools: []
  scope:
    domains:
      - testing
      - remediation
  approval_required: true
  schedule:
    max_interval: 60

implementation:
  module: will.workers.test_remediator
  class: TestRemediatorWorker
  requires_core_context: true
