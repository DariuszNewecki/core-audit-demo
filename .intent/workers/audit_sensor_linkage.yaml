$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_sensor_linkage
  title: Audit Violation Sensor - Linkage
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "c4d5e6f7-a8b9-4c0d-8e1f-2a3b4c5d6e7f"
  class: sensing

mandate:
  responsibility: >
    Run the constitutional auditor scoped to all linkage.* rules and post
    each unprocessed violation as a blackboard finding for downstream
    processing by ViolationRemediatorWorker. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  scope:
    rule_namespace: "linkage"
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 600

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
  # ADR-081 D2(2) — full-codebase AST walks; categorical heavy worker.
  # Step 0 evidence (2026-06-01): observed max loop-hold 81.69s, vastly over
  # the 5s D2(1) gate. Must run in its own asyncio event loop.
  requires_dedicated_process: true
  params:
    dry_run: false
