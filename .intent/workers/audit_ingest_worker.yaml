$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_ingest_worker
  title: Audit Ingest Worker
  version: "0.1.0"
  authority: policy
  status: active
  rationale: >
    Head of the prompt governance remediation pipeline:
    audit_ingest_worker → prompt_extractor_worker → prompt_artifact_writer → call_site_rewriter.
    No ai.* namespace sensor exists; this worker is the sole entry point for
    ai.prompt.model_required findings. Activated once the
    make_request_async() → PromptModel.invoke() migration reached zero call-site
    violations; runs as a regression guard against reintroduction.

identity:
  uuid: "c70004f6-5aa2-40a1-98b9-b703ea93facf"
  class: sensing

mandate:
  responsibility: >
    Read the most recent audit run findings for rule ai.prompt.model_required
    and post each unprocessed violation as a blackboard finding.
  phase: audit
  permitted_tools: []
  scope:
    paths: []
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 1800

implementation:
  module: will.workers.audit_ingest_worker
  class: AuditIngestWorker
  requires_core_context: true
  # ADR-081 D2(2) — calls auditor.run_full_audit_async() which triggers a full
  # constitutional audit (AST walks across the entire codebase). Step 0
  # evidence (2026-06-01) confirms: observed max loop-hold 77.81s, vastly over
  # the 5s D2(1) gate. Promoted from the ADR's anchor list under D8 Step 1's
  # "any other worker subsequently confirmed by D2(1) loop-hold measurement."
  requires_dedicated_process: true
