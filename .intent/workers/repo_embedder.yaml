$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.repo_embedder
  title: Repo Embedder
  version: "1.0.0"
  authority: policy
  status: active
  rationale: >
    Activated per ADR-018 as the embedding consumer in the decomposed
    autonomous path. Consumes repo_artifacts entries where chunk_count = 0
    (the explicit work-queue contract documented in ADR-018 D4, populated
    by RepoCrawlerWorker on content change), chunks each artifact by type,
    embeds the chunks, and upserts them into the appropriate Qdrant
    collection. Module path corrected from will.workers.repo_embedder to
    will.workers.repo_embedding to match the package on disk (ADR-018
    D3a). Registry singleton invariant restored in the worker class
    (ADR-018 D3b) — RepoEmbedderWorker routes Qdrant and Cognitive
    service access through service_registry rather than direct
    construction.

identity:
  uuid: "c30a50fa-a761-4013-8088-a7b45d29f3e0"
  class: sensing

mandate:
  responsibility: >
    Consume repo_artifacts records where content_hash has changed or
    chunk_count is zero, chunk each artifact by its type, embed the chunks,
    and upsert them into the appropriate Qdrant collection:
    python→core-code, docs→core-docs, tests→core-tests, prompts→core-prompts,
    reports→core-reports, intent→core-patterns.
    Updates repo_artifacts.chunk_count on completion.
    Depends on RepoCrawlerWorker having populated repo_artifacts first.
  phase: audit
  permitted_tools:
    - file.read
    - llm.embedder
  scope:
    paths:
      - "src/**"
      - "docs/**"
      - "tests/**"
      - "var/prompts/**"
      - "reports/**"
    domains:
      - knowledge
      - semantic
  approval_required: false
  schedule:
    max_interval: 600
    batch_size: 50

implementation:
  module: will.workers.repo_embedding
  class: RepoEmbedderWorker
  requires_core_context: false
