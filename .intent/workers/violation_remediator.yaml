$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.violation_remediator
  title: Violation Remediator
  version: "0.2.0"
  authority: policy
  status: active

identity:
  uuid: "bb52f62a-45c9-47a4-9ff8-788b0c6ca4f1"
  class: acting

mandate:
  responsibility: >
    Consume open audit violation findings from the Blackboard, look up the
    remediating action from the atomic action registry via the remediates
    field, create one Proposal per unique action group, and mark each
    consumed Blackboard entry as resolved. No LLM calls. No file writes.
  phase: execution
  permitted_tools: []
  scope:
    domains:
      - compliance
      - remediation
  approval_required: false
  schedule:
    max_interval: 60

implementation:
  module: will.workers.violation_remediator
  class: ViolationRemediatorWorker
  requires_core_context: true
