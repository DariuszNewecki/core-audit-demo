$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.test_runner_sensor
  title: Test Runner Sensor
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "4cd25142-3953-458f-8d0f-6cbe674e02f0"
  class: sensing

mandate:
  responsibility: >
    Claim test.run_required findings from the Blackboard, run pytest scoped
    to the corresponding test file, and post a test.failure finding for each
    failing test. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  approval_required: false
  schedule:
    max_interval: 300

implementation:
  module: will.workers.test_runner_sensor
  class: TestRunnerSensor
  requires_core_context: true
