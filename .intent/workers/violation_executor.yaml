# .intent/workers/violation_executor.yaml
$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.violation_executor
  title: Violation Executor
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "c9d4e5f6-a7b8-4c0d-9e1f-2a3b4c5d6e7f"
  class: acting

mandate:
  responsibility: >
    For each open audit violation finding, build a deterministic architectural
    context package (evidence only, not authority) for the violating file,
    invoke RemoteCoder via PromptModel to produce a fix, validate via
    Crate/Canary ceremony, and apply to live src/ with a git commit.
    Also supports file-mode operation: accepts findings injected directly from
    a file-scoped full audit (bypassing the Blackboard sensor), enabling
    diagnosis-first remediation of a single file across all rules.
  phase: execution
  permitted_tools:
    - llm.remote_coder
    - file.read
    - crate.create
    - canary.validate
    - crate.apply
    - git.commit
  scope:
    paths:
      - "src/**"
      - "var/mind/rollbacks/**"
    domains:
      - compliance
      - remediation
  approval_required: true
  schedule:
    # Cadence — was previously unset, defaulting to worker_shop globals.
    # Declared explicitly so the per-cycle bound below has a stable reference.
    max_interval: 600
    # Blast bound — per-cycle files-rewritten cap (2026-05-24 hardening sweep
    # blast-bound principle). claim_limit caps findings, not files; a single
    # cycle could otherwise rewrite up to claim_limit distinct files. Worker
    # processes the first N files (where N = files_per_cycle_max), then
    # releases the remaining claimed findings back to `open` so they re-enter
    # the queue for the next cycle. The work is not lost — pacing only.
    # When the cap is hit, an OPEN coherence.violation_executor.blast_bound
    # finding is posted for governor visibility.
    files_per_cycle_max: 10

implementation:
  module: will.workers.violation_executor
  class: ViolationExecutorWorker
  requires_core_context: true
