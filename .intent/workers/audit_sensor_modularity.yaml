$schema: "META/worker.schema.json"
kind: worker

metadata:
  id: workers.audit_sensor_modularity
  title: Audit Violation Sensor - Modularity
  version: "1.0.0"
  authority: policy
  status: active

identity:
  uuid: "cf0760a5-bd3c-4a6c-bf86-4d5dfacfde01"
  class: sensing

mandate:
  responsibility: >
    Run the constitutional auditor scoped to all modularity.* rules and post
    each unprocessed violation as a blackboard finding for downstream
    processing by ViolationRemediatorWorker. No LLM calls. No file writes.
  phase: audit
  permitted_tools: []
  scope:
    rule_namespace: "modularity"
    domains:
      - audit
      - compliance
  approval_required: false
  schedule:
    max_interval: 600

implementation:
  module: will.workers.audit_violation_sensor
  class: AuditViolationSensor
  requires_core_context: true
  # ADR-081 D2(2) — full-codebase AST walks; categorical heavy worker.
  # Step 0 evidence (2026-06-01): observed max loop-hold 79.41s, vastly over
  # the 5s D2(1) gate. Must run in its own asyncio event loop.
  requires_dedicated_process: true
  params:
    dry_run: false
