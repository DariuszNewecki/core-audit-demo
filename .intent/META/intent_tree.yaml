$schema: "META/intent_tree.schema.json"

required_directories:
  - META
  - constitution
  - rules

optional_directories:
  - papers
  - phases
  - workflows
  - enforcement
  - workers
  - taxonomies

validated_directories:
  - META
  - flows
  - phases
  - rules
  - workers
  - workflows/definitions
  - workflows/stages

notes: >
  Authoritative declaration of the .intent/ directory structure.
  IntentRepository reads this file to determine which directories to scan.
  Adding a directory here is the constitutional act of making it part of the
  Mind. No directory outside this list is authoritative for governance purposes.
  validated_directories declares the subset that the META validator actively
  checks against JSON schemas. Directories present but not listed here have no
  schema yet and are excluded from validation until one is written.
