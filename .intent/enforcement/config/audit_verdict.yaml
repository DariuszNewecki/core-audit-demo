# Audit verdict policy — severity-to-verdict mapping for ConstitutionalAuditor.
#
# Authority:   policy
# Phase:       audit
# Rule ref:    .intent/phases/audit.yaml (declare_pass_fail permitted action)
# ADR:         ADR-005 (.specs/decisions/ADR-005-govern-audit-verdict-policy.md)
# Loader:      src/shared/infrastructure/intent/audit_verdict.py
#
# This file is the governance authority over audit verdict semantics.
# Changing verdict semantics is a .intent/ edit, not a src/ edit.
#
# ─────────────────────────────────────────────────────────────────────
# What each verdict guarantees
# ─────────────────────────────────────────────────────────────────────
#
# PASS      No ERROR-severity findings (after the ignored_finding_types
#           carve-out), no crashed rules, policy loaded. The codebase
#           is operational. WARNING-severity findings MAY be present;
#           they represent queued self-remediation work, not blockers.
#
# FAIL      At least one finding with a severity in fail_severities,
#           and not in ignored_finding_types. A new problem has been
#           introduced — code is known non-compliant.
#
# DEGRADED  The audit instrument itself failed: the verdict policy is
#           missing/corrupt, one or more rules crashed during
#           evaluation, or execution statistics could not be computed.
#           Compliance is unknown, not known-bad. DEGRADED must never
#           be silently treated as PASS — see ADR-005 §3.
#
# ─────────────────────────────────────────────────────────────────────
# Why WARNINGs do not gate PASS
# ─────────────────────────────────────────────────────────────────────
#
# CORE is a feedback control system whose job is to clean itself up
# while running. WARNING-severity findings are the work queue that
# autonomous remediation consumes — accumulation during development is
# expected, not pathological. ERRORs are reserved for newly-introduced
# problems that block operation.
#
# The Convergence Principle (rate of resolution exceeds rate of
# creation) is a trajectory property measured across audits over time.
# It is deliberately NOT encoded in the single-audit verdict, because
# that would require CORE to already be converged in order to claim
# it is operational — backwards for a system bootstrapping toward that
# state. If a future operational posture requires a stricter verdict
# (WARNING ceiling, trend gate, finding-class allowlist), that is a
# new ADR, not a silent edit here.
#
# ─────────────────────────────────────────────────────────────────────
# Missing-or-corrupt handling
# ─────────────────────────────────────────────────────────────────────
#
# The loader returns an error sentinel that callers must treat as
# DEGRADED. The loader does NOT fall back to hardcoded defaults. A
# missing verdict-policy file is itself an instrument failure —
# compliance cannot be decided when the rule for deciding it is
# absent. See ADR-005 §3.

# Severities that trigger FAIL when any finding carries them (after the
# ignored_finding_types carve-out). Vocabulary is the AuditSeverity enum
# in src/shared/models/audit_models.py: INFO | LOW | MEDIUM | HIGH | BLOCK
# (5-value scale per ADR-059 D2). BLOCK is the sole fail-triggering
# severity; HIGH/MEDIUM/LOW are actionable but do not block CI.
fail_severities:
  - BLOCK

# Finding types excluded from the FAIL trigger.
# ENFORCEMENT_FAILURE findings are emitted with severity=ERROR by
# rule_executor.py and constitutional_auditor_dynamic.py when rules crash.
# They drive DEGRADED via crashed_rule_ids, not FAIL. This carve-out
# preserves the invariant that "infrastructure broken" (unknown
# compliance) is distinguishable from "code broken" (known non-compliance).
ignored_finding_types:
  - ENFORCEMENT_FAILURE

# Preconditions that force DEGRADED regardless of finding severities.
# any_crashed_rules → crashed_rule_ids set is non-empty.
# stats_error       → get_dynamic_execution_stats() threw internally;
#                     execution coverage is unknown. A zeroed stats
#                     panel does not mean zero rules ran — it means
#                     the stats computation itself failed. Compliance
#                     status cannot be asserted when coverage is
#                     unquantifiable.
degraded_on:
  - any_crashed_rules
  - stats_error
