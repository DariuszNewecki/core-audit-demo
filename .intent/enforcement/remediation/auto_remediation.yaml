# .intent/enforcement/remediation/auto_remediation.yaml
#
# Constitutional Remediation Map
# Authority: policy
# Phase: audit
# Status: active
#
# PURPOSE:
#   Maps audit check_ids to autonomous fix handlers.
#   Consumed by: body/autonomy/audit_analyzer.py (AuditAnalyzer)
#                will/workers/violation_remediator.py (ViolationRemediatorWorker)
#
# CONFIDENCE TIERS:
#   >= 0.90  → safe_only mode (deterministic, zero reasoning required)
#   >= 0.70  → medium_risk mode (deterministic with light validation)
#   >= 0.50  → all_deterministic mode (requires handler to be confirmed working)
#   < 0.50   → NOT dispatched; handler stub must be implemented first
#
# RISK LEVELS:
#   low    → single-file, deterministic, fully reversible
#   medium → multi-step, deterministic but affects logic flow
#   high   → structural changes, requires LLM or A3 loop
#
# HANDLER STATUS KEY:
#   ACTIVE   → action confirmed in atomic action registry
#   DELEGATE → non-automatable; ViolationRemediatorWorker routes to governor
#              inbox as an indeterminate finding requiring human decision.
#              Confidence set below MIN_CONFIDENCE (0.80); included in the
#              active map so ViolationExecutorWorker cannot claim it as unmapped.
#   PENDING  → action does not yet exist in registry; confidence set below
#              MIN_CONFIDENCE (0.80) to prevent dispatch until implemented.
#              Excluded from the active map entirely (loader skips PENDING).
#
# NOTE ON MIN_CONFIDENCE:
#   ViolationRemediatorWorker uses this map directly.
#   Only entries >= 0.80 will produce proposals.
#   DELEGATE entries are routed to the governor inbox, not proposals.
#   PENDING entries are documented for roadmap visibility only.
#
# FLOW ENTRIES:
#   Entries may use 'flow' instead of 'action' to dispatch through FlowExecutor.
#   Flow-based proposals always have approval_required=True (compute_risk()
#   classifies flows as "moderate"). Human approval is required before execution.
#
# ACTION IDs MUST match exactly what is registered in body/atomic/.
# Registered actions (as of 2026-04-05):
#   fix.atomic_actions, fix.docstrings, fix.duplicate_ids, fix.format,
#   fix.headers, fix.ids, fix.imports, fix.logging, fix.modularity,
#   fix.placeholders
#
# FLOW IDs MUST match exactly what is registered in body/flows/registry.
# Registered flows (as of 2026-05-05):
#   flow.build_tests, flow.fix_code, flow.dev_sync, flow.sync_state

mappings:
  # ===========================================================================
  # TIER 1: ACTIVE — safe_only (confidence >= 0.90)
  # Deterministic, fully reversible, no reasoning required.
  # ===========================================================================

  style.import_order:
    action: fix.imports
    confidence: 0.92
    risk: low
    description: >
      Sort imports in a single file using ruff (isort-compatible).
    status: ACTIVE

  linkage.duplicate_ids:
    action: fix.duplicate_ids
    confidence: 0.90
    risk: low
    description: >
      Regenerate fresh UUIDs for any duplicate # ID: comment tags. Safe: only
      rewrites comment lines, never touches logic.
    status: ACTIVE

  purity.no_todo_placeholders:
    action: fix.placeholders
    confidence: 0.92
    risk: low
    description: >
      Replace forbidden placeholder strings (TODO, FIXME, TBD, etc.).
      Deterministic regex — no reasoning required.
    status: ACTIVE

  linkage.assign_ids:
    action: fix.ids
    confidence: 0.91
    risk: low
    description: >
      Insert # ID: UUID comment above public functions and methods that lack
      one. Pure AST, no LLM, fully deterministic.
    status: ACTIVE

  logic.logging.standard_only:
    action: fix.logging
    confidence: 0.92
    risk: low
    description: >
      Replace print() and console.print() with logger calls. Deterministic AST
      transformation, no reasoning required.
    status: ACTIVE

  architecture.channels.logic_no_terminal_rendering:
    action: fix.logging
    confidence: 0.90
    risk: low
    description: >
      Terminal rendering (Rich, print) in logic layer must be replaced with
      logger calls. Deterministic AST fix.
    status: ACTIVE

  purity.stable_id_anchor:
    action: fix.ids
    confidence: 0.91
    risk: low
    description: >
      Insert missing stable ID anchors on public symbols.
    status: ACTIVE

  layout.src_module_header:
    action: fix.headers
    confidence: 0.91
    risk: low
    description: >
      Add or correct module header comments in src/ files.
    status: ACTIVE

  style.formatter_required:
    action: fix.format
    confidence: 0.92
    risk: low
    description: >
      Format file with ruff-format. Deterministic, fully reversible.
    status: ACTIVE

  workflow.ruff_format_check:
    action: fix.format
    confidence: 0.92
    risk: low
    description: >
      File would be reformatted by ruff format. Deterministic, fully reversible.
      Same handler as style.formatter_required — two rule IDs, one action.
    status: ACTIVE

  purity.docstrings.required:
    action: fix.docstrings
    confidence: 0.90
    risk: low
