  # Architecture modularity enforcement mappings
  # Design principle — UNIX philosophy evaluation

  mappings:
    # LAW: Maintain UNIX philosophy
    # Advisory — evaluated by LLM for architectural simplicity
    modularity.unix_philosophy:
      engine: llm_gate
      params:
        instruction: >
          Evaluate if this module follows the UNIX philosophy: 'Do one thing and do it well.'
          Flag if the module is becoming a 'God Object' that handles too many unrelated concerns.
        rationale: "Constitutional requirement for architectural simplicity."
      scope:
        applies_to:
          - "src/**/*.py"
      # ADR-043 D2 / ADR-042 D1: LOC is a pre-selector, responsibility
      # count is the verdict. The LLM only verdicts on classes that
      # modularity.class_too_large has already flagged. Without this,
      # the rule fans out to ~872 files and saturates the LLM provider.
      requires_findings_from:
        - modularity.class_too_large
