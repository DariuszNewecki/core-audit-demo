# .intent/enforcement/mappings/architecture/channels.yaml
#
# Communication channel enforcement mappings for architectural compliance

mappings:
  # Logic/runtime code must not use direct print output.
  architecture.channels.logic_logger_only:
    engine: ast_gate
    params:
      check_type: no_print_statements
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/cli/**"
        - "src/body/cli/**"
        - "src/api/**"
        - "src/cli/utils/**"
        - "src/will/cli_logic/**"
        - "tests/**"

  # Logic/runtime code must not use terminal-oriented rendering primitives.
  # enforcement: reporting — see channels.json note for migration context.
  # src/will/workflows/** excluded pending migration to src/cli/.
  # This entire cluster (dev_sync_reporter, phase executors) is constitutional
  # debt: it performs terminal rendering from Will layer. Migration is required
  # before this rule can be restored to blocking enforcement.
  # Tracked in: architecture.channels.logic_no_terminal_rendering rationale.
  #
  # Widened 2026-04-18:
  # - forbidden_imports: added rich.{pretty,tree,progress,markdown,live,prompt}
  #   (all other Rich submodules that produce terminal output) plus pprint.
  # - forbidden_calls: added sys.{stdout,stderr}.write (direct terminal I/O
  #   that bypasses logger), pprint.pprint (stdlib pretty-printing), and
  #   console.{log,rule} (other Rich Console output methods).
  # Bare "pprint" deliberately NOT added — too generic a name to list bare;
  # would require import-tracking to catch safely.
  architecture.channels.logic_no_terminal_rendering:
    engine: ast_gate
    params:
      check_type: forbidden_imports_and_calls
      forbidden_imports:
        - "rich.console"
        - "rich.table"
        - "rich.panel"
        # Added: other Rich submodules that produce terminal output
        - "rich.pretty"
        - "rich.tree"
        - "rich.progress"
        - "rich.markdown"
        - "rich.live"
        - "rich.prompt"
        # Added: stdlib pretty-printing (terminal output)
        - "pprint"
      forbidden_calls:
        - "Console"
        - "console.print"
        - "Table"
        - "Panel"
        - "typer.echo"
        # Added: direct terminal I/O bypassing the logger
        - "sys.stdout.write"
        - "sys.stderr.write"
        # Added: stdlib pretty-printing (qualified form only — bare pprint
        # is too generic to list safely)
        - "pprint.pprint"
        # Added: other Rich Console output methods beyond .print
        - "console.log"
        - "console.rule"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/cli/**"
        - "src/body/cli/**"
        - "src/api/**"
        - "src/cli/utils/**"
        - "src/will/cli_logic/**"
        - "src/will/workflows/**"
        - "tests/**"

  # API modules must not use terminal-oriented rendering primitives.
  #
  # Widened 2026-04-18: same additions as logic_no_terminal_rendering.
  # The two rules share vocabulary; if the logic rule catches it, the API
  # rule should too. Statement is if anything stronger for API (structured
  # output only), so the wider gate matches intent.
  architecture.channels.api_structured_output_only:
    engine: ast_gate
    params:
      check_type: forbidden_imports_and_calls
      forbidden_imports:
        - "rich.console"
        - "rich.table"
        - "rich.panel"
        - "rich.pretty"
        - "rich.tree"
        - "rich.progress"
        - "rich.markdown"
        - "rich.live"
        - "rich.prompt"
        - "pprint"
      forbidden_calls:
        - "Console"
        - "console.print"
        - "Table"
        - "Panel"
        - "typer.echo"
        - "print"
        - "sys.stdout.write"
        - "sys.stderr.write"
        - "pprint.pprint"
        - "console.log"
        - "console.rule"
    scope:
      applies_to:
        - "src/api/**/*.py"
      excludes:
        - "tests/**"

  # Logger must not be abused as a presentation renderer.
  #
  # Narrowed 2026-05-19 (#364): removed CLI-related excludes
  # (src/cli/**, src/body/cli/**, src/cli/utils/**, src/will/cli_logic/**).
  # Rationale: the rule governs logger misuse, not rendering. CLI may render
  # via console.print (architecture.channels.cli_rendering_allowed), but
  # passing Rich markup to logger.* leaks tags to log files in every layer,
  # CLI included. src/will/workflows/** retained pending migration to
  # src/cli/ (same exclusion as logic_no_terminal_rendering).
  architecture.channels.logger_not_presentation:
    engine: ast_gate
    params:
      check_type: logger_not_presentation
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/will/workflows/**"
        - "tests/**"

  # ADVISORY DECLARATION — permissive rule, no engine check needed.
  architecture.channels.cli_rendering_allowed:
    engine: advisory
    params:
      note: >
        Permissive declaration. CLI surface modules MAY use Rich and
        terminal-oriented rendering for user-facing output. This rule grants
        permission; it does not detect violations.
    scope:
      applies_to:
        - "src/cli/**/*.py"
