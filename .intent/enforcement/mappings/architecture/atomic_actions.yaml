# .intent/enforcement/mappings/architecture/atomic_actions.yaml
#
# Enforcement mappings for atomic action constitutional rules.
# Based on: .intent/rules/architecture/atomic_actions.json
#
# Most rules in this file are enforced at Python runtime (registration-time
# or execution-time) rather than by a static analysis engine. The
# python_runtime engine documents where enforcement occurs in code.
#
# The advisory entry is a naming boundary declaration —
# it grants no automated check but removes the rule from declared_only.
#
# The regex_gate entry enforces the governed-impact-level invariant
# statically at audit time.

mappings:
  # Rule: atomic_actions.must_return_action_result
  # Enforcement: Registration-time validation in registry.py
  atomic_actions.must_return_action_result:
    engine: python_runtime
    params:
      check_type: registration_time_validation
      enforcement_location: "body.atomic.registry.register_action"
      validation_function: "_validate_action_signature"
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"

  # Rule: atomic_actions.must_have_decorator
  # Enforcement: Registration-time validation in registry.py
  atomic_actions.must_have_decorator:
    engine: python_runtime
    params:
      check_type: registration_time_validation
      enforcement_location: "body.atomic.registry.register_action"
      validation_function: "_validate_action_signature"
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"

  # Rule: atomic_actions.result_must_be_structured
  # Enforcement: Runtime validation in executor.py
  atomic_actions.result_must_be_structured:
    engine: python_runtime
    params:
      check_type: runtime_validation
      enforcement_location: "body.atomic.executor.ActionExecutor.execute"
      validation_function: "_validate_action_result"
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"

  # Rule: atomic_actions.no_governance_bypass
  # Enforcement: Both registration-time and runtime
  atomic_actions.no_governance_bypass:
    engine: python_runtime
    params:
      check_type: comprehensive_validation
      enforcement_locations:
        - "body.atomic.registry.register_action"
        - "body.atomic.executor.ActionExecutor.execute"
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"

  # ADVISORY DECLARATION — naming boundary rule, not engine-checkable.
  atomic_actions.fix_action_scope:
    engine: advisory
    params:
      note: >
        Naming boundary declaration. fix.imports is exclusively scoped to
        import ordering and sorting. It must not be used for import validation
        or module existence checks. Enforced by code review and convention,
        not by automated engine.
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"

  # Rule: atomic_actions.impact_level_must_be_governed
  # Enforcement: Static audit-time detection via regex scan.
  # Complements Python-level enforcement (TypeError at import, ConstitutionalError
  # at executor init) with an earlier audit-time signal.
  atomic_actions.impact_level_must_be_governed:
    engine: regex_gate
    params:
      forbidden_patterns:
        - "impact_level\\s*="
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"
      excludes:
        - "tests/**/*.py"
        - "src/body/atomic/registry.py"
        - "src/body/atomic/executor.py"

  # Rule: atomic_actions.must_accept_kwargs
  # Enforcement: Decoration-time TypeError raise in shared/atomic_action.py.
  # Every @atomic_action whose signature lacks **kwargs fails at import,
  # so no audit-time finding is ever produced — the daemon cannot start
  # with a violator present. See ADR-070 D8 and issue #448.
  atomic_actions.must_accept_kwargs:
    engine: python_runtime
    params:
      check_type: decoration_time_validation
      enforcement_location: "shared.atomic_action.atomic_action"
      validation_function: "inspect.signature **kwargs presence check"
    scope:
      applies_to:
        - "src/body/atomic/**/*.py"
