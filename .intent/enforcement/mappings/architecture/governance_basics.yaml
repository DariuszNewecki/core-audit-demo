 # .intent/enforcement/mappings/architecture/governance_basics.yaml
  #
  # Governance enforcement mappings for constitutional compliance

  mappings:
    # 1. Protection of the Constitution itself
    governance.constitution.read_only:
      engine: glob_gate
      params:
        patterns_prohibited:
          - .intent/**
      scope:
        applies_to:
          - src/**/*.py

    # 2. THE BLOCKING LAW: Logic mutations must be governed.
    # This list EXCLUDES components that are allowed to use direct writes.
    #
    # Forbidden surface converged 2026-05-31 (#489 / ADR-077 §6 step 3):
    # the check now derives its forbidden set from
    # .intent/taxonomies/filesystem_operations.yaml filtered by
    # op_class == "write". The previous forbidden_additional block
    # (os.*/shutil.*/aiofiles.open) is now redundant with the watched:
    # block of the taxonomy; aiofiles.open was dropped (no src/ consumer,
    # legacy defensive coverage). The §4 gap-set (mkdir, makedirs, touch,
    # symlink, link, chmod) is now covered by both leaf-matched pathlib
    # entries and qualified-matched os.* entries. Variable-receiver
    # `p.replace(...)` / `p.rename(...)` remain a pre-existing accepted
    # gap — see #489 migration trap. Bare-import resolution for the
    # qualified entries (closed in #488, 2026-05-30) is preserved by
    # ASTHelpers.resolve_qualified_name; star imports and dynamic imports
    # remain out of reach.
    governance.logic_mutation.governed:
      engine: ast_gate
      params:
        check_type: no_direct_writes
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          # --- THE BOOTSTRAP: Infrastructure that enables governance ---
          # These components implement the governed surface itself and must
          # operate before governance is active (Load Phase)
          - "src/shared/infrastructure/storage/file_handler.py" # IS the governed surface
          - "src/shared/path_utils.py" # Path resolution utilities
          - "src/body/services/crate_processing_service.py" # Crate generation infrastructure
          - "src/mind/governance/runtime_validator.py" # Validation infrastructure
          - "src/shared/infrastructure/validation/ruff_linter.py" # Linting infrastructure
          # Subprocess sanctuary — also owns ephemeral worktree directory
          # cleanup (/tmp/core-action-sandbox-*) per ADR-071 D2.2.
          # shutil.rmtree fallback covers crashed-git worktrees the orphan
          # sweep can't reach (admin entry pruned, directory remains).
          - "src/shared/infrastructure/git_service.py" # Git + ephemeral worktree sanctuary
          # Runtime cache for ContextPackets — operates beneath the
          # FileHandler abstraction on var/cache/context/ ephemera; not a
          # constitutional artifact surface. Same shape as runtime_validator
          # and ruff_linter above.
          - "src/shared/infrastructure/context/cache.py" # Runtime cache infrastructure
          # --- ADDED 2026-05-31 (#507 Phase 2 drain — Tier 2 authority-scoped exclusions) ---
          # Each entry mirrored in mutation_surface.yaml's excludes set.
          # Per-line rationale; see #507 for the full disposition table.
          - "src/body/governance/key_management_service.py" # Security-sanctuary: chmod 0600 on private keying material; FileHandler exposes no chmod primitive
          - "src/shared/action_logger.py" # Bootstrap-tier: module-level singleton instantiated at import; append-mode action audit log; FileHandler has no append surface
          - "src/shared/infrastructure/storage/integrity_service.py" # Bootstrap-tier (circular): sibling of file_handler.py; SHA256 baseline writer validates governance, cannot depend on it
          - "src/will/test_generation/sandbox.py" # Ephemeral-zone: writes under tempfile.TemporaryDirectory; FileHandler is repo-bound and refuses out-of-repo paths (separate /tmp/ hazard: #508)
          - "src/cli/resources/intent/sync_vocabulary.py" # Provisional: constitutional vocabulary regenerator writing .intent/META/vocabulary.json; ADR-077 §6 step 3 authority-scoped exception. REMOVE when sanctioned .intent/ write-path lands (#510)
          # --- AUTONOMOUS CODE: Now enforced (no exclusions for self-healing) ---
          # Self-healing modules MUST route writes through FileHandler
          # (sandbox.py above is test-generation, not self-healing)

    # 3. Artifact mutations must be traceable via FileHandler.
    # Advisory — automated detection not feasible for SHOULD-level requirement
    # without high false-positive risk. Verified by code review and FileHandler
    # usage convention.
    governance.artifact_mutation.traceable:
      engine: advisory
      params:
        note: >
          System artifacts, logs, and reports SHOULD be generated via FileHandler
          to ensure audit traceability. Enforced by architectural convention and
          code review. The SHOULD-level enforcement and diversity of write paths
          make automated detection impractical without unacceptable false-positive
          risk.
      scope:
        applies_to:
          - "src/**/*.py"

    governance.no_governance_bypass:
      engine: ast_gate
      params:
        check_type: forbidden_primitives
        forbidden:
          - "IntentGuard(bypass=True)"
          - "bypass_governance"
          - "disable_governance"
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "tests/**"

    # Widened 2026-04-18:
    # - "Popen" (bare) catches `from subprocess import Popen; Popen(...)` —
    #   the bare-import form that previously bypassed the `subprocess.Popen`
    #   pattern because full_attr_name resolves to "Popen" without the prefix.
    # - subprocess variants (check_call, check_output, getoutput,
    #   getstatusoutput) — all legitimate subprocess entry points that
    #   invoke commands but don't route through run/call/Popen.
    # - os process-spawn family (execv, execvp, execve, spawnv, spawnvp, fork) —
    #   alternative paths to process creation outside the os.system family.
    #
    # Deliberately NOT added (collision risk):
    # - Bare "call", "run", "fork" — names too generic; would produce false
    #   positives on legitimate code (e.g., app.run(), func.call()).
    # - "builtins.eval" / "builtins.exec" / "builtins.compile" — nobody writes
    #   these forms; the bare names are already caught.
    #
    # Bare-import gap closed 2026-05-30 (#488 sibling fix):
    # - `from os import system; system(...)` is now caught:
    #   check_forbidden_primitives resolves Name-form callees through the
    #   import alias map and matches the qualified form ("os.system")
    #   against the forbidden list. The "Popen" entry below is now redundant
    #   with bare-import resolution against "subprocess.Popen" but is kept
    #   as a belt-and-suspenders guard.
    governance.dangerous_execution_primitives:
      engine: ast_gate
      params:
        check_type: forbidden_primitives
        forbidden:
          # Original list
          - "eval"
          - "exec"
          - "compile"
          - "os.system"
          - "subprocess.Popen"
          - "subprocess.call"
          - "subprocess.run"
          - "os.getenv"
          - "os.environ"
          # Added: bare-import form of subprocess.Popen (distinctive name, low collision risk)
          - "Popen"
          # Added: subprocess family variants
          - "subprocess.check_call"
          - "subprocess.check_output"
          - "subprocess.getoutput"
          - "subprocess.getstatusoutput"
          # Added: os process-spawn family (alternative paths to process creation)
          - "os.execv"
          - "os.execvp"
          - "os.execve"
          - "os.spawnv"
          - "os.spawnvp"
          - "os.fork"
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          # --- STANDARD CONFIG LAYER ---
          - "src/shared/logger.py"
          - "src/shared/config.py" # Authoritative env-var read surface

          # --- GIT INFRASTRUCTURE ---
          - "src/shared/infrastructure/git_service.py" # subprocess is the only git interface

          # --- SUBPROCESS UTILITIES ---
          - "src/shared/utils/subprocess_utils.py" # Dedicated subprocess sanctuary

          # --- LINTING / QUALITY TOOLING ---
          # These invoke external tools (ruff, pytest, coverage) by design
          - "src/shared/infrastructure/validation/ruff_linter.py"
          - "src/body/quality/coverage_analyzer.py"
          - "src/cli/commands/check/quality_gates.py"
          - "src/cli/commands/coverage/services/coverage_rep*"
          - "src/body/self_healing/test_context/metrics.py"

          # --- BOOTSTRAP & LIFECYCLE ---
          - "src/body/atomic/check_actions.py"
          - "src/body/project_lifecycle/bootstrap_service.py"
          - "src/body/workers/violation_remediator/ceremony.py" # Runs ruff/linting as remediation — subprocess sanctuary

          # --- DB INFRASTRUCTURE ---
          - "src/shared/infrastructure/repositories/db/commo*" # DB migration tooling

          # --- SANDBOXED POLICY EVALUATION ---
          # eval/compile here are SAFE: input validated via AST allowlist,
          # builtins disabled, only .intent/ policy conditions evaluated.
          # Reviewed and approved as constitutional governance infrastructure.
          - "src/body/services/policy_expression_evaluator.py"

          # --- MINOR ENV READS IN BODY/CLI (os.environ/os.getenv) ---
          # Body/CLI layer reading environment config is acceptable;
          # env reads should route through config service where possible.
          - "src/body/governance/runtime_validator.py"
          - "src/body/infrastructure/lifespan.py"
          - "src/cli/logic/interactive_test/steps/utils.py"
          - "src/will/test_generation/sandbox.py" # os.environ for PYTHONPATH only

          - "tests/**"

    governance.intent_meta.required:
      engine: glob_gate
      params:
        check_type: path_match
        patterns:
          - ".intent/META/GLOBAL-DOCUMENT-META-SCHEMA.json"
      scope:
        applies_to:
          - ".intent/META/GLOBAL-DOCUMENT-META-SCHEMA.json"
