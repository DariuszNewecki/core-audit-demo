  mappings:
    # 1. LAW: Production code MUST NOT contain 'TODO', 'FIXME', or 'TBD'
    # Check type: regex_gate (Deterministic String Match)
    purity.no_todo_placeholders:
      engine: regex_gate
      params:
        forbidden_patterns:
          - "\\bTODO\\b"
          - "\\bFIXME\\b"
          - "\\bTBD\\b"
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "tests/**/*.py"
          - "scripts/**/*.py"

    # 2. LAW: Every public symbol MUST have a stable '# ID:' anchor
    # Check type: ast_gate (Context-Aware definition lookup)
    purity.stable_id_anchor:
      engine: ast_gate
      params:
        check_type: id_anchor
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "**/__init__.py"
          - "tests/**/*.py"
          - "scripts/**/*.py"

    # 3. LAW: Metadata belongs in the DB, not the code (@capability, @owner)
    # Check type: ast_gate (Decorator inspection)
    purity.no_metadata_decorators:
      engine: ast_gate
      params:
        check_type: forbidden_decorators
        forbidden:
          - "capability"
          - "meta"
          - "owner"
          - "domain"
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "tests/**/*.py"

    # LAW: Public symbols MUST have docstrings (not placeholders).
    # Narrowed scope (#310): the periodic audit checks only public-surface
    # entry points where docstrings are part of the external contract.
    # ADR-047: engine moved from llm_gate to ast_gate. The presence check
    # is structural (ast.get_docstring is not None), so it does not need
    # a language model. Placeholder content ("""TODO""") is already
    # caught by purity.no_todo_placeholders above. Retiring this rule's
    # llm_gate usage eliminates verdict instability (see #311) and frees
    # local-LLM concurrency budget for genuinely semantic rules.
    purity.docstrings.required:
      engine: ast_gate
      params:
        check_type: docstrings_present
      scope:
        applies_to:
          - "src/api/**/*.py"
          - "src/cli/commands/**/*.py"
          - "src/will/workers/**/*.py"
          - "src/body/atomic/**/*.py"
        excludes:
          - "**/__init__.py"
          - "tests/**/*.py"

    # 5. LAW: Code MUST NOT contain exact AST duplicates
    purity.no_ast_duplication:
      engine: knowledge_gate
      params:
        check_type: ast_duplication
        threshold: 1.0
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "tests/**/*.py"
          - "src/shared/infrastructure/intent/intent_repository.py"
          - "src/shared/infrastructure/specs/specs_repository.py"

    # 6. LAW: Code SHOULD NOT contain semantic duplicates
    purity.no_semantic_duplication:
      engine: knowledge_gate
      params:
        check_type: semantic_duplication
        threshold: 0.85
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "tests/**/*.py"

    # LAW: A refactor MUST preserve domain logic (no silent deletion of behavior).
    # This rule compares a proposed code DIFF to the original. The periodic
    # audit pipeline has no diff — it scans current-state files. The effective
    # scope is the proposal-execution pipeline (fix.modularity, build.tests),
    # which receives old/new pairs from the executor. Audit scope is the empty
    # set so periodic sensors skip the rule without removing it from the
    # registry (ADR-043 D7 / #310).
    purity.logic_conservation:
      engine: llm_gate
      params:
        instruction: >
          Compare the proposed refactor to the original code.
          Verify that no significant domain logic has been deleted.
          If the code size shrunk by more than 50%, ensure it was due to
          de-duplication, not logic removal.
        rationale: "Evaluated at proposal-execution time, not periodic audit."
      scope:
        applies_to: []


    purity.no_dead_code:
      engine: workflow_gate
      params:
        check_type: dead_code_check
        tool: "vulture"
        confidence: 80
      scope:
        applies_to:
          - "src/**/*.py"

    # LAW: tempfile.* without explicit dir= resolves to /tmp/ (CLAUDE.md prohibition).
    # AST-detected: presence of dir= kwarg on TemporaryDirectory/NamedTemporaryFile/
    # mkdtemp/mkstemp; outright forbid tempfile.gettempdir(). The dir= VALUE is not
    # statically validated — trusting the kwarg is present catches the four real-world
    # silent siblings (#508) and any future regression at the same level of confidence.
    purity.tempfile_default_dir:
      engine: ast_gate
      params:
        check_type: tempfile_default_dir
      scope:
        applies_to:
          - "src/**/*.py"
        excludes:
          - "tests/**/*.py"
          - "scripts/**/*.py"


    # 7. LAW: Production source files MUST be reachable from a declared entry point.
    purity.no_orphan_files:
      engine: knowledge_gate
      params:
        check_type: orphan_file_check
        entry_points:
          - "src/cli/"
          - "src/body/atomic/"
          - "src/main.py"
          - "src/api/main.py"
          - "src/mind/logic/engines/"
          - "src/mind/governance/checks/"
          - "src/will/workers/"
          - "src/will/phases/"
          - "src/body/services/"
          - "src/will/self_healing/"
          - "src/will/test_generation/"
          - "src/will/strategists/"
          - "src/will/tools/"
          - "src/will/agents/"
          - "src/will/workflows/"
          - "src/will/cli_logic/"
          - "src/will/autonomy/"
          - "src/will/orchestration/"
          - "src/body/self_healing/"
          - "src/body/project_lifecycle/"
          - "src/body/maintenance/scripts/"
          - "src/body/invokers/"
          - "src/shared/infrastructure/"
        excludes:
          - "src/**/__init__.py"
          - "src/**/__main__.py"
          - "src/**/conftest.py"
          - "scripts/**/*.py"
          - "src/api/**"
          - "src/body/analyzers/**"
          - "src/body/autonomy/**"
          - "src/body/evaluators/**"
          - "src/body/governance/**"
          - "src/body/introspection/**"
          - "src/shared/cli_types.py"
          - "src/shared/models/pattern_graph.py"
          - "src/shared/utils/header_tools.py"
          - "src/shared/utils/path_utils.py"
          - "src/mind/governance/micro_proposal_validator.py"
      scope:
        applies_to:
          - "src/**/*.py"
