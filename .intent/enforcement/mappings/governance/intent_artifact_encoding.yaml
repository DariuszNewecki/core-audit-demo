# .intent/enforcement/mappings/governance/intent_artifact_encoding.yaml
#
# Enforcement mapping for governance.intent_artifact_encoding rules.
#
# This binding connects the declared law to the regex_gate engine.
# The regex detects any byte outside printable ASCII + standard whitespace.
# Violation at parse phase blocks the artifact from being loaded into the
# constitutional index, preventing downstream runtime failures.

mappings:
  governance.intent_artifact_encoding.ascii_only:
    engine: regex_gate
    params:
      # Match any character outside: tab (0x09), LF (0x0A), CR (0x0D),
      # space through tilde (0x20-0x7E).
      # Common violations: em dash (U+2014), curly quotes (U+2018/2019/201C/201D),
      # ellipsis (U+2026), non-breaking space (U+00A0).
      pattern: "[^\\x09\\x0A\\x0D\\x20-\\x7E]"
      match_means: violation
      message: >
        Non-ASCII character detected in .intent/ artifact. All intent files must
        contain only printable ASCII (0x20-0x7E) plus standard whitespace.
        Common causes: em dash (use '-' instead of '\u2014'), curly quotes
        (use straight quotes), ellipsis (use '...' instead of '\u2026'),
        non-breaking space (use regular space). Check any text copied from
        external editors or generated by LLMs.
    scope:
      applies_to:
        - ".intent/**/*.yaml"
        - ".intent/**/*.json"
      excludes:
        - ".intent/META/**"
