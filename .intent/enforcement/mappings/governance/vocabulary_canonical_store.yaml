# .intent/enforcement/mappings/governance/vocabulary_canonical_store.yaml
#
# Enforcement mapping for governance.vocabulary_canonical_store rules.
# Declared under ADR-023 (Vocabulary Canonical Store).
#
# Rules 1-3 require artifact_gate engine with vocabulary-specific check_types.
# Engine implementation is pending ADR-023 Part 3/4 delivery; until then
# these entries close the enforcement triangle structurally while the engine
# is built. Rule 4 is enforceable now via regex_gate.
#
# No auto_remediation entries: vocabulary drift and import violations
# require human-authored correction, not text substitution.

mappings:
  # RULE: governance.vocabulary.projection_must_match_canonical
  # Verifies that vocabulary.json is consistent with the canonical section of
  # CORE-Vocabulary.md: every term present in both directions, source_hash
  # matching the SHA-256 of the canonical section fence-to-fence.
  governance.vocabulary.projection_must_match_canonical:
    engine: artifact_gate
    params:
      check_type: vocabulary_projection_consistency
    scope:
      applies_to:
        - ".intent/META/vocabulary.json"
        - ".specs/papers/CORE-Vocabulary.md"

  # RULE: governance.vocabulary.canonical_format_must_validate
  # Verifies that the canonical section of CORE-Vocabulary.md conforms to the
  # grammar declared in ADR-023 D2: correct heading, single markdown table,
  # required columns in order, all cells non-empty, no nested structures.
  governance.vocabulary.canonical_format_must_validate:
    engine: artifact_gate
    params:
      check_type: vocabulary_canonical_format
    scope:
      applies_to:
        - ".specs/papers/CORE-Vocabulary.md"

  # RULE: governance.vocabulary.authoritative_source_must_be_paper
  # Verifies that every authoritative_paper value in the canonical section and
  # in vocabulary.json resolves to an existing file within the governed tree,
  # and that the values match between projection and canonical section.
  governance.vocabulary.authoritative_source_must_be_paper:
    engine: artifact_gate
    params:
      check_type: vocabulary_authoritative_paths
    scope:
      applies_to:
        - ".intent/META/vocabulary.json"
        - ".specs/papers/CORE-Vocabulary.md"

  # RULE: governance.vocabulary.no_direct_json_import
  # Ensures no src/ module other than the sanctioned loader reads vocabulary.json
  # directly via any file access mechanism. All vocabulary access must route
  # through the loader so that hash verification and DEGRADED mode are enforced.
  governance.vocabulary.no_direct_json_import:
    engine: regex_gate
    params:
      forbidden_patterns:
        - "(open|read_text|read_bytes|json\\.loads?)\\s*\\([^)]*vocabulary\\.json"
        - "vocabulary\\.json[^)\\n]*\\)\\.(read|read_text|read_bytes)"
    scope:
      applies_to:
        - "src/**/*.py"
      excludes:
        - "src/shared/infrastructure/intent/vocabulary_projection.py"
        - "tests/**"
